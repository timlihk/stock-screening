name: SEPA scan

on:
  workflow_dispatch:
    inputs:
      exchanges:
        description: "Comma-separated exchanges (nasdaq,nyse,amex,arca,bats)"
        required: true
        default: "nasdaq,nyse"
      min_price:
        description: "Minimum share price (USD)"
        required: true
        default: "5"
      min_adv_usd:
        description: "Minimum 20-day avg dollar volume (USD)"
        required: true
        default: "50000000"
      min_setup_score:
        description: "Minimum composite setup score (0-12)"
        required: true
        default: "5"
      use_qullamaggie:
        description: "Include Qullamaggie momentum signals"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      use_finviz_prefilter:
        description: "Use Finviz pre-filter (fast, ~3x speedup)"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      universe_source:
        description: "Universe provider (sec_edgar is authoritative)"
        required: true
        default: "sec_edgar"
        type: choice
        options: ["sec_edgar", "nasdaq_trader"]
      exclude_biotech:
        description: "Exclude biotech names (Jeff Sun rule)"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      institutional_buying:
        description: "Require positive institutional transactions (Finviz filter)"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
  schedule:
    # 22:00 UTC weekdays = 5pm EST (winter) / 6pm EDT (summer).
    # All three screeners (SEPA shortlist, RS leaders, sector rotation) run
    # in the same job, so the daily run produces everything at once.
    - cron: "0 22 * * 1-5"

permissions:
  contents: write

concurrency:
  group: sepa-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scanner/requirements.txt

      - name: Install dependencies
        run: pip install -r scanner/requirements.txt

      - name: Resolve parameters
        id: params
        run: |
          EXCHANGES="${{ github.event.inputs.exchanges || 'nasdaq,nyse' }}"
          MIN_PRICE="${{ github.event.inputs.min_price || '5' }}"
          MIN_ADV="${{ github.event.inputs.min_adv_usd || '50000000' }}"
          MIN_SCORE="${{ github.event.inputs.min_setup_score || '5' }}"
          USE_QM="${{ github.event.inputs.use_qullamaggie || 'true' }}"
          USE_FV="${{ github.event.inputs.use_finviz_prefilter || 'true' }}"
          SRC="${{ github.event.inputs.universe_source || 'sec_edgar' }}"
          XBIO="${{ github.event.inputs.exclude_biotech || 'false' }}"
          INST="${{ github.event.inputs.institutional_buying || 'false' }}"
          echo "exchanges=$EXCHANGES" >> "$GITHUB_OUTPUT"
          echo "min_price=$MIN_PRICE" >> "$GITHUB_OUTPUT"
          echo "min_adv=$MIN_ADV" >> "$GITHUB_OUTPUT"
          echo "min_score=$MIN_SCORE" >> "$GITHUB_OUTPUT"
          echo "use_qm=$USE_QM" >> "$GITHUB_OUTPUT"
          echo "use_fv=$USE_FV" >> "$GITHUB_OUTPUT"
          echo "src=$SRC" >> "$GITHUB_OUTPUT"
          echo "xbio=$XBIO" >> "$GITHUB_OUTPUT"
          echo "inst=$INST" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%F)" >> "$GITHUB_OUTPUT"
          echo "run_id=$(date -u +%Y%m%dT%H%M%SZ)" >> "$GITHUB_OUTPUT"

      - name: Run SEPA universe scan
        id: scan
        env:
          SEC_USER_AGENT: "stock-screening tim@timli.net"
        run: |
          set -o pipefail
          mkdir -p public/results/latest
          QM_FLAG="--use-qullamaggie"
          if [ "${{ steps.params.outputs.use_qm }}" = "false" ]; then
            QM_FLAG="--no-qullamaggie"
          fi
          FV_FLAG=""
          if [ "${{ steps.params.outputs.use_fv }}" = "true" ]; then
            FV_FLAG="--use-finviz-prefilter"
          fi
          XBIO_FLAG=""
          if [ "${{ steps.params.outputs.xbio }}" = "true" ]; then
            XBIO_FLAG="--exclude-biotech"
          fi
          INST_FLAG=""
          if [ "${{ steps.params.outputs.inst }}" = "true" ]; then
            INST_FLAG="--institutional-buying"
          fi
          python3 scanner/sepa_scan_universe.py \
            --exchanges "${{ steps.params.outputs.exchanges }}" \
            --universe-source "${{ steps.params.outputs.src }}" \
            $FV_FLAG $XBIO_FLAG $INST_FLAG \
            --min-price "${{ steps.params.outputs.min_price }}" \
            --min-adv-usd "${{ steps.params.outputs.min_adv }}" \
            --min-setup-score "${{ steps.params.outputs.min_score }}" \
            $QM_FLAG \
            --output-dir public/results/latest \
            --date "${{ steps.params.outputs.date }}" \
            2>&1 | tee public/results/latest/scan.log

      - name: Sector rotation dashboard
        run: |
          python3 scanner/sector_scan.py \
            --output-dir public/results/latest \
            --date "${{ steps.params.outputs.date }}"

      - name: Build shortlist (earnings filter + sector bonus + fundamentals)
        env:
          DATE: ${{ steps.params.outputs.date }}
          DESC_CACHE: public/cache/descriptions.json
          EARNINGS_CACHE: public/cache/earnings.json
          FUNDAMENTALS_CACHE: public/cache/fundamentals.json
          SECTORS_JSON: public/results/latest/sectors.json
          SIMFIN_API_KEY: ${{ secrets.SIMFIN_API_KEY }}
        run: |
          python3 - <<'PY'
          import os, sys, pandas as pd
          sys.path.insert(0, "scanner")
          from earnings import get_earnings_map
          from fundamentals import get_fundamentals_map
          from sector_align import load_sector_ranks, load_description_cache, sector_bonus_for, sector_name_for

          p = "public/results/latest"
          date = os.environ["DATE"].replace("-", "")
          csv = f"{p}/results_universe_{date}.csv"
          df = pd.read_csv(csv)
          if "regime_eligible" not in df.columns:
              raise RuntimeError("results CSV is missing regime_eligible; rerun the scanner with the updated logic")
          passers = df[df["regime_eligible"] == True].copy()

          # Apply sector bonus from the freshly-computed sector dashboard
          sector_ranks = load_sector_ranks()
          desc_cache = load_description_cache()
          passers["sector_name"] = passers["ticker"].apply(lambda t: sector_name_for(t, desc_cache))
          passers["sector_bonus"] = passers["ticker"].apply(lambda t: sector_bonus_for(t, sector_ranks, desc_cache))

          # SimFin fundamentals — pulled only for regime-eligible passers,
          # 30-day disk cache. Adds fundamental_score (0-5) based on revenue
          # + net-income YoY growth and acceleration. Graceful degradation
          # if SIMFIN_API_KEY isn't set.
          fund_map = get_fundamentals_map(passers["ticker"].tolist())
          def _fund(t, key, default=0):
              entry = fund_map.get(t) or {}
              v = entry.get(key)
              return v if v is not None else default
          passers["fundamental_score"] = passers["ticker"].apply(lambda t: _fund(t, "fundamental_score"))
          passers["revenue_yoy_growth"] = passers["ticker"].apply(lambda t: _fund(t, "revenue_yoy_growth", None))
          passers["net_income_yoy_growth"] = passers["ticker"].apply(lambda t: _fund(t, "net_income_yoy_growth", None))
          passers["earnings_accelerating"] = passers["ticker"].apply(lambda t: _fund(t, "earnings_accelerating", None))

          # Unified ranking: normalized family strength (excess above that
          # family's threshold). Fundamentals ranks next — the SEPA "is this
          # a real compounder" gate. Then entry/leadership/sector/ties.
          rank_col = "rs_pct_rank" if "rs_pct_rank" in passers.columns else "rs_vs_spy"
          sort_cols = ["best_family_excess", "fundamental_score", "entry_score",
                       "leadership_score", "sector_bonus", "qualified_count",
                       rank_col]
          passers = passers.sort_values(sort_cols, ascending=[False] * len(sort_cols))

          # Evaluate ranked candidates in batches so only earnings-checked names
          # can qualify for the final shortlist. Keep scanning until the
          # unified top-20 and per-archetype dashboards have enough survivors,
          # or until we exhaust the ranked passers.
          earnings = {}
          selected_rows = []
          checked_candidates = 0
          dropped_for_earnings = 0
          batch_size = 40
          archetypes = ["sepa_vcp", "power_play", "qm_continuation", "expansion_tight"]

          def enough_survivors(rows):
              if len(rows) < 20:
                  return False
              survivors = pd.DataFrame(rows)
              for arch in archetypes:
                  qual_col = f"{arch}_qualifies"
                  if qual_col not in survivors.columns:
                      return False
                  if int(survivors[qual_col].sum()) < 10:
                      return False
              return True

          for start in range(0, len(passers), batch_size):
              chunk = passers.iloc[start:start + batch_size].copy()
              if chunk.empty:
                  break
              chunk_tickers = chunk["ticker"].tolist()
              chunk_earnings = get_earnings_map(chunk_tickers)
              earnings.update(chunk_earnings)
              chunk["days_to_earnings"] = chunk["ticker"].map(chunk_earnings.get)
              chunk["near_earnings"] = chunk["days_to_earnings"] <= 10
              checked_candidates += len(chunk)
              dropped_for_earnings += int(chunk["near_earnings"].sum())
              selected_rows.extend(chunk[~chunk["near_earnings"]].to_dict(orient="records"))
              if enough_survivors(selected_rows):
                  break

          survivors = pd.DataFrame(selected_rows)
          tradable = survivors.head(20)

          def format_note(row, arch=None):
              # `arch` is the archetype this note is being written for (when
              # building a per-archetype shortlist). If the name qualifies for
              # additional families beyond `arch`, show them as "+other_arch".
              headline_arch = arch or row.get("primary_setup", "setup")
              headline_score_col = f"{headline_arch}_score" if headline_arch and headline_arch != "setup" else "setup_score"
              headline_score = row.get(headline_score_col, row.get("setup_score", 0))
              parts = [f"{headline_arch} {headline_score:.0f}"]
              # "also fits" → other archetypes this name qualifies for
              all_arches = ["sepa_vcp", "power_play", "qm_continuation", "expansion_tight"]
              also = [a for a in all_arches
                      if a != headline_arch and row.get(f"{a}_qualifies", False)]
              if also:
                  parts.append("+" + "/".join(also))
              if "entry_score" in row and pd.notna(row["entry_score"]):
                  parts.append(f"Entry {int(row['entry_score'])}")
              if "leadership_score" in row and pd.notna(row["leadership_score"]):
                  parts.append(f"Lead {int(row['leadership_score'])}")
              if "tightness_score" in row and pd.notna(row["tightness_score"]):
                  parts.append(f"Tight {int(row['tightness_score'])}/3")
              if "fundamental_score" in row and pd.notna(row["fundamental_score"]) and int(row["fundamental_score"]) > 0:
                  parts.append(f"Fund {int(row['fundamental_score'])}/5")
              if "qm_score" in row and pd.notna(row["qm_score"]):
                  parts.append(f"QM {int(row['qm_score'])}")
              if "rs_pct_rank" in row and pd.notna(row["rs_pct_rank"]):
                  parts.append(f"RSpct {int(row['rs_pct_rank'])}")
              if row.get("sector_name") and str(row["sector_name"]) != "nan":
                  parts.append(f"{row['sector_name']}")
              if pd.notna(row.get("days_to_earnings")) and row["days_to_earnings"] < 999:
                  parts.append(f"Earn {int(row['days_to_earnings'])}d")
              parts.append(f"RS {row.rs_vs_spy:+.0f}")
              return " · ".join(parts)

          # Unified shortlist (top 20 across all archetypes)
          with open(f"{p}/shortlist.txt", "w") as f:
              for _, row in tradable.iterrows():
                  f.write(f"{row['ticker']}|{format_note(row)}\n")

          # Per-archetype shortlists (top 10 each) — powers the separate
          # dashboards. Multi-membership: a name is in every archetype for
          # which it qualifies (not just its primary). Each per-archetype
          # list is sorted by that family's own score.
          for arch in archetypes:
              qual_col = f"{arch}_qualifies"
              score_col = f"{arch}_score"
              if qual_col not in survivors.columns:
                  open(f"{p}/shortlist_{arch}.txt", "w").close()
                  print(f"  {arch}: qualification column missing — skipping")
                  continue
              subset = survivors[survivors[qual_col] == True].copy()
              if score_col in subset.columns:
                  subset = subset.sort_values(
                      [score_col, "entry_score", "leadership_score",
                       "sector_bonus", rank_col],
                      ascending=[False, False, False, False, False],
                  )
              subset = subset.head(10)
              with open(f"{p}/shortlist_{arch}.txt", "w") as f:
                  for _, row in subset.iterrows():
                      f.write(f"{row['ticker']}|{format_note(row, arch=arch)}\n")
              print(f"  {arch}: {len(subset)} names")

          print(f"Top 20 shortlist: {tradable.ticker.tolist()}")
          print(f"  checked {checked_candidates} candidates for earnings proximity")
          print(f"  dropped {dropped_for_earnings} candidates for earnings proximity")
          PY

      - name: Generate chart page (unified top-20 shortlist)
        env:
          DESC_CACHE: public/cache/descriptions.json
        run: |
          mkdir -p public/cache
          rm -f /tmp/sepa-scan/charts_*.html
          if [ -s public/results/latest/shortlist.txt ]; then
            TICKERS=$(awk -F'|' '{print $1}' public/results/latest/shortlist.txt | paste -sd ',' -)
            python3 scanner/build_chart_page.py \
              --date "${{ steps.params.outputs.date }}" \
              --tickers "$TICKERS" \
              --notes-file public/results/latest/shortlist.txt \
              --no-open
            cp "$(ls -t /tmp/sepa-scan/charts_*.html | head -1)" public/results/latest/charts.html
          fi

      - name: Generate per-archetype chart pages
        env:
          DESC_CACHE: public/cache/descriptions.json
        run: |
          for arch in sepa_vcp power_play qm_continuation expansion_tight; do
            SHORTLIST="public/results/latest/shortlist_${arch}.txt"
            if [ -s "$SHORTLIST" ]; then
              rm -f /tmp/sepa-scan/charts_*.html
              TICKERS=$(awk -F'|' '{print $1}' "$SHORTLIST" | paste -sd ',' -)
              python3 scanner/build_chart_page.py \
                --date "${{ steps.params.outputs.date }}" \
                --tickers "$TICKERS" \
                --notes-file "$SHORTLIST" \
                --no-open
              cp "$(ls -t /tmp/sepa-scan/charts_*.html | head -1)" "public/results/latest/charts_${arch}.html"
              echo "built charts_${arch}.html"
            else
              echo "skip ${arch}: shortlist empty"
            fi
          done

      - name: RS leaders (IBD-style, top 50 by universe RS percentile)
        env:
          DESC_CACHE: public/cache/descriptions.json
        run: |
          DATE_TAG=$(echo "${{ steps.params.outputs.date }}" | tr -d '-')
          python3 scanner/rs_leaders.py \
            --results-csv "public/results/latest/results_universe_${DATE_TAG}.csv" \
            --output-dir public/results/latest \
            --top-n 50
          # Chart page for the top 12 of the RS leader list
          if [ -s public/results/latest/rs_leaders.txt ]; then
            rm -f /tmp/sepa-scan/charts_*.html
            TICKERS=$(awk -F'|' '{print $1}' public/results/latest/rs_leaders.txt | head -12 | paste -sd ',' -)
            # plain date -- don't embed title in date since it becomes part of the filename
            python3 scanner/build_chart_page.py \
              --date "${{ steps.params.outputs.date }}" \
              --tickers "$TICKERS" \
              --notes-file public/results/latest/rs_leaders.txt \
              --no-open
            cp "$(ls -t /tmp/sepa-scan/charts_*.html | head -1)" public/results/latest/rs_leaders_charts.html
          fi

      - name: Write metadata JSON
        run: |
          cat > public/results/latest/meta.json <<EOF
          {
            "run_id": "${{ steps.params.outputs.run_id }}",
            "date": "${{ steps.params.outputs.date }}",
            "inputs": {
              "exchanges": "${{ steps.params.outputs.exchanges }}",
              "min_price": "${{ steps.params.outputs.min_price }}",
              "min_adv_usd": "${{ steps.params.outputs.min_adv }}",
              "min_setup_score": "${{ steps.params.outputs.min_score }}",
              "use_qullamaggie": "${{ steps.params.outputs.use_qm }}",
              "use_finviz_prefilter": "${{ steps.params.outputs.use_fv }}",
              "universe_source": "${{ steps.params.outputs.src }}",
              "exclude_biotech": "${{ steps.params.outputs.xbio }}",
              "institutional_buying": "${{ steps.params.outputs.inst }}"
            },
            "triggered_by": "${{ github.event_name }}",
            "actor": "${{ github.actor }}"
          }
          EOF

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/results/latest/ public/cache/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "scan: ${{ steps.params.outputs.date }} · ${{ steps.params.outputs.exchanges }} · \$${{ steps.params.outputs.min_adv }}"
          # Retry up to 3 times to reconcile with any concurrent pushes.
          for attempt in 1 2 3; do
            if git push; then
              echo "push succeeded on attempt $attempt"
              exit 0
            fi
            echo "push failed on attempt $attempt; rebasing and retrying"
            git pull --rebase origin main
          done
          echo "push failed after 3 attempts"
          exit 1
