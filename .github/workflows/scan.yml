name: SEPA scan

on:
  workflow_dispatch:
    inputs:
      exchanges:
        description: "Comma-separated exchanges (nasdaq,nyse,amex,arca,bats)"
        required: true
        default: "nasdaq,nyse"
      min_price:
        description: "Minimum share price (USD)"
        required: true
        default: "5"
      min_adv_usd:
        description: "Minimum 20-day avg dollar volume (USD)"
        required: true
        default: "50000000"
      min_setup_score:
        description: "Minimum composite setup score (0-10)"
        required: true
        default: "4"
      use_qullamaggie:
        description: "Include Qullamaggie momentum signals"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      use_finviz_prefilter:
        description: "Use Finviz pre-filter (fast, ~3x speedup)"
        required: true
        default: "true"
        type: choice
        options: ["true", "false"]
      universe_source:
        description: "Universe provider (sec_edgar is authoritative)"
        required: true
        default: "sec_edgar"
        type: choice
        options: ["sec_edgar", "nasdaq_trader"]
  schedule:
    # 22:00 UTC weekdays = 5pm EST (winter) / 6pm EDT (summer).
    # All three screeners (SEPA shortlist, RS leaders, sector rotation) run
    # in the same job, so the daily run produces everything at once.
    - cron: "0 22 * * 1-5"

permissions:
  contents: write

concurrency:
  group: sepa-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scanner/requirements.txt

      - name: Install dependencies
        run: pip install -r scanner/requirements.txt

      - name: Resolve parameters
        id: params
        run: |
          EXCHANGES="${{ github.event.inputs.exchanges || 'nasdaq,nyse' }}"
          MIN_PRICE="${{ github.event.inputs.min_price || '5' }}"
          MIN_ADV="${{ github.event.inputs.min_adv_usd || '50000000' }}"
          MIN_SCORE="${{ github.event.inputs.min_setup_score || '4' }}"
          USE_QM="${{ github.event.inputs.use_qullamaggie || 'true' }}"
          USE_FV="${{ github.event.inputs.use_finviz_prefilter || 'true' }}"
          SRC="${{ github.event.inputs.universe_source || 'sec_edgar' }}"
          echo "exchanges=$EXCHANGES" >> "$GITHUB_OUTPUT"
          echo "min_price=$MIN_PRICE" >> "$GITHUB_OUTPUT"
          echo "min_adv=$MIN_ADV" >> "$GITHUB_OUTPUT"
          echo "min_score=$MIN_SCORE" >> "$GITHUB_OUTPUT"
          echo "use_qm=$USE_QM" >> "$GITHUB_OUTPUT"
          echo "use_fv=$USE_FV" >> "$GITHUB_OUTPUT"
          echo "src=$SRC" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%F)" >> "$GITHUB_OUTPUT"
          echo "run_id=$(date -u +%Y%m%dT%H%M%SZ)" >> "$GITHUB_OUTPUT"

      - name: Run SEPA universe scan
        id: scan
        env:
          SEC_USER_AGENT: "stock-screening tim@timli.net"
        run: |
          set -o pipefail
          mkdir -p public/results/latest
          QM_FLAG="--use-qullamaggie"
          if [ "${{ steps.params.outputs.use_qm }}" = "false" ]; then
            QM_FLAG="--no-qullamaggie"
          fi
          FV_FLAG=""
          if [ "${{ steps.params.outputs.use_fv }}" = "true" ]; then
            FV_FLAG="--use-finviz-prefilter"
          fi
          python3 scanner/sepa_scan_universe.py \
            --exchanges "${{ steps.params.outputs.exchanges }}" \
            --universe-source "${{ steps.params.outputs.src }}" \
            $FV_FLAG \
            --min-price "${{ steps.params.outputs.min_price }}" \
            --min-adv-usd "${{ steps.params.outputs.min_adv }}" \
            --min-setup-score "${{ steps.params.outputs.min_score }}" \
            $QM_FLAG \
            --output-dir public/results/latest \
            --date "${{ steps.params.outputs.date }}" \
            2>&1 | tee public/results/latest/scan.log

      - name: Build chart page from top shortlist
        run: |
          python3 - <<'PY'
          import os, pandas as pd
          p = "public/results/latest"
          date = os.environ["DATE"].replace("-", "")
          csv = f"{p}/results_universe_{date}.csv"
          df = pd.read_csv(csv)
          passers = df[df.all_pass == True].copy()
          sort_cols = ["setup_score"]
          if "qm_score" in passers.columns: sort_cols.append("qm_score")
          sort_cols.append("rs_pct_rank" if "rs_pct_rank" in passers.columns else "rs_vs_spy")
          passers = passers.sort_values(sort_cols, ascending=[False] * len(sort_cols))
          top = passers.head(20).ticker.tolist()
          with open(f"{p}/shortlist.txt", "w") as f:
              for t in top:
                  row = passers[passers.ticker == t].iloc[0]
                  note = f"Setup {int(row.setup_score)}"
                  if "qm_score" in row and pd.notna(row["qm_score"]):
                      note += f" · QM {int(row['qm_score'])}"
                  if "rs_pct_rank" in row and pd.notna(row["rs_pct_rank"]):
                      note += f" · RSpct {int(row['rs_pct_rank'])}"
                  note += f" · RS {row.rs_vs_spy:+.0f}"
                  f.write(f"{t}|{note}\n")
          print(f"Top shortlist: {top}")
          PY
        env:
          DATE: ${{ steps.params.outputs.date }}

      - name: Generate chart page (SEPA shortlist)
        env:
          DESC_CACHE: public/cache/descriptions.json
        run: |
          mkdir -p public/cache
          TICKERS=$(awk -F'|' '{print $1}' public/results/latest/shortlist.txt | paste -sd ',' -)
          python3 scanner/build_chart_page.py \
            --date "${{ steps.params.outputs.date }}" \
            --tickers "$TICKERS" \
            --notes-file public/results/latest/shortlist.txt \
            --no-open
          cp /tmp/sepa-scan/charts_*.html public/results/latest/charts.html || true

      - name: RS leaders (IBD-style, top 50 by universe RS percentile)
        env:
          DESC_CACHE: public/cache/descriptions.json
        run: |
          DATE_TAG=$(echo "${{ steps.params.outputs.date }}" | tr -d '-')
          python3 scanner/rs_leaders.py \
            --results-csv "public/results/latest/results_universe_${DATE_TAG}.csv" \
            --output-dir public/results/latest \
            --top-n 50
          # Chart page for the top 12 of the RS leader list
          if [ -s public/results/latest/rs_leaders.txt ]; then
            TICKERS=$(awk -F'|' '{print $1}' public/results/latest/rs_leaders.txt | head -12 | paste -sd ',' -)
            python3 scanner/build_chart_page.py \
              --date "${{ steps.params.outputs.date }} — RS Leaders" \
              --tickers "$TICKERS" \
              --notes-file public/results/latest/rs_leaders.txt \
              --no-open
            cp /tmp/sepa-scan/charts_*.html public/results/latest/rs_leaders_charts.html || true
          fi

      - name: Sector rotation dashboard
        run: |
          python3 scanner/sector_scan.py \
            --output-dir public/results/latest \
            --date "${{ steps.params.outputs.date }}"

      - name: Write metadata JSON
        run: |
          cat > public/results/latest/meta.json <<EOF
          {
            "run_id": "${{ steps.params.outputs.run_id }}",
            "date": "${{ steps.params.outputs.date }}",
            "inputs": {
              "exchanges": "${{ steps.params.outputs.exchanges }}",
              "min_price": "${{ steps.params.outputs.min_price }}",
              "min_adv_usd": "${{ steps.params.outputs.min_adv }}",
              "min_setup_score": "${{ steps.params.outputs.min_score }}",
              "use_qullamaggie": "${{ steps.params.outputs.use_qm }}",
              "use_finviz_prefilter": "${{ steps.params.outputs.use_fv }}",
              "universe_source": "${{ steps.params.outputs.src }}"
            },
            "triggered_by": "${{ github.event_name }}",
            "actor": "${{ github.actor }}"
          }
          EOF

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/results/latest/ public/cache/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "scan: ${{ steps.params.outputs.date }} · ${{ steps.params.outputs.exchanges }} · \$${{ steps.params.outputs.min_adv }}"
            git push
          fi
