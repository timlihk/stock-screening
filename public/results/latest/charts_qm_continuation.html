<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SEPA Finalists — 2026-04-19</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 20px;
    background: #0f1115; color: #e6e6e6;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    line-height: 1.45;
  }
  h1 { font-size: 18px; margin: 0 0 4px; letter-spacing: .3px; }
  .sub { font-size: 12px; color: #9aa0a6; margin: 0 0 20px; }
  .row {
    display: grid;
    grid-template-columns: minmax(0, 3fr) minmax(0, 2fr);
    gap: 14px;
    margin-bottom: 14px;
  }
  .card {
    background: #161a22; border: 1px solid #262b36;
    border-radius: 8px; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .card header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 9px 14px; background: #1b2029; border-bottom: 1px solid #262b36;
    font-size: 13px;
  }
  .tag { color: #9aa0a6; font-size: 11px; }
  .chart { height: 520px; width: 100%; }
  .desc { padding: 14px 16px; font-size: 13px; overflow-y: auto; }
  .desc .meta { font-size: 12px; color: #9aa0a6; margin-bottom: 10px; }
  .desc .stats {
    display: flex; flex-wrap: wrap; gap: 6px 10px; margin-bottom: 12px;
  }
  .desc .stats span {
    background: #1b2029; padding: 3px 8px; border-radius: 4px;
    font-size: 11px; color: #c6cbd3; border: 1px solid #262b36;
  }
  .desc .summary { color: #cfd4dc; font-size: 12.5px; white-space: pre-wrap; }
  .desc a { color: #7ab3ff; text-decoration: none; font-size: 11px; }
  .desc a:hover { text-decoration: underline; }
  @media (max-width: 1100px) {
    .row { grid-template-columns: 1fr; }
    .chart { height: 420px; }
  }
</style>
</head>
<body>
<h1>SEPA Finalists — 2026-04-19</h1>
<p class="sub">1-year daily view · SMA 10 / 20 / 50 / 200 · ranked by buy-zone proximity + VCP quality</p>

<div id="container"></div>

<script>
  const finalists = [{"t": "TEL", "note": "qm_continuation 6 \u00b7 Entry 5 \u00b7 Lead 7 \u00b7 Tight 0/3 \u00b7 QM 2 \u00b7 RSpct 79 \u00b7 Technology \u00b7 RS +59"}, {"t": "WCC", "note": "qm_continuation 6 \u00b7 Entry 4 \u00b7 Lead 9 \u00b7 Tight 1/3 \u00b7 QM 3 \u00b7 RSpct 83 \u00b7 Industrials \u00b7 RS +81"}];
  const info = {"TEL": {"country": "Ireland", "employees": 90000, "industry": "Electronic Components", "marketCap": 72250826752, "name": "TE Connectivity plc", "sector": "Technology", "summary": "TE Connectivity plc, together with its subsidiaries, manufactures and sells connectivity and sensor solutions in Europe, the Middle East, Africa, the Asia\u0096Pacific, and the Americas. The company operates through two reportable segments, Transportation Solutions and Industrial Solutions. It provides antennas, application tooling, cable assemblies, connectors, electromagnetic compatibility/electromagnetic interference solutions, energy and power, fiber optics, heat shrink tubing, identification and labeling, medical components, passive components, relays and contactors, sensors, switches, terminals and splices, wires and cables, and wire protection and management solutions. The company also offers training and other services, including 3D printing for production, back shells prototyping, electrical installation training, HarnWare software, machine tooling service and repair, medical device design services, microfluidic devices, and sensor manufacturing services as well as conducts automotive webinars. It serves 5G and wireless equipment, aerospace, appliances, automation and control, automotive, autosport, commercial and industrial vehicles, connected home, data centers and artificial intelligence, defense and military, energy solutions, e-mobility, industrial machinery, intelligent buildings, IoT connectivity, medical technologies, oil and gas/marine, personal electronics and wearable technology, rail, sensor applications, space, and other industries. The company was formerly known as Tyco Electronics Ltd. and changed its name to TE Connectivity plc in March 2011. TE Connectivity plc was founded in 1941 and is based in Ballybrit, Ireland.", "website": "https://www.te.com"}, "WCC": {"country": "United States", "employees": 21000, "industry": "Industrial Distribution", "marketCap": 15526071296, "name": "WESCO International, Inc.", "sector": "Industrials", "summary": "WESCO International, Inc. provides business-to-business distribution, logistics services, and supply chain solutions in the United States, Canada, and internationally. It operates through three segments: Electrical & Electronic Solutions (EES), Communications & Security Solutions (CSS), and Utility & Broadband Solutions (UBS). The EES segment offers electrical equipment and supplies, automation and connected devices, security, lighting, wire and cable, and safety, as well as maintenance, repair, and operating (MRO) products. This segment also offers project execution solutions, direct and indirect manufacturing supply chain optimization programs, lighting and renewables advisory services, and digital and automation solutions. The CSS segment provides data center, network infrastructure, and security solutions. This segment sells products directly to security and network, professional audio/visual, and systems integrators, as well as data communications contractors. It also provides professional A/V, safety, facilities, and energy management solutions. The UBS segment offers products and services to investor-owned utilities, electric power cooperatives and municipalities, service and wireless providers, broadband operators, and contractors. This segment's products include wires and cables, transformers, transmission and distribution hardware, switches, protective devices, connectors, lighting and connectivity products, conduits, fiber and power cables, pole line hardware, racks, cabinets, safety and MRO products, and wireless devices. It also offers fiber project management, high and medium voltage project design and support, pre-wired meters and capacitor banks, meter testing and advanced metering infrastructure installation, personal protective equipment, dielectric testing, and tool repair, as well as emergency response, storage yard, materials, and logistics management solutions. The company was founded in 1922 and is headquartered in Pittsburgh, Pennsylvania.", "website": "https://www.wesco.com"}};

  function fmtCap(c) {
    if (!c) return "";
    if (c >= 1e12) return "$" + (c / 1e12).toFixed(1) + "T";
    if (c >= 1e9)  return "$" + (c / 1e9).toFixed(2) + "B";
    if (c >= 1e6)  return "$" + (c / 1e6).toFixed(0) + "M";
    return "$" + c;
  }

  const container = document.getElementById("container");

  finalists.forEach(({ t, note }, idx) => {
    const meta = info[t] || {};
    const cap = fmtCap(meta.marketCap);
    const emp = meta.employees ? meta.employees.toLocaleString() + " empl." : "";
    const sector = [meta.sector, meta.industry].filter(Boolean).join(" · ");
    const country = meta.country || "";
    const summary = meta.summary || "(no description available from Yahoo Finance)";
    const website = meta.website
      ? `<a href="${meta.website}" target="_blank" rel="noreferrer">${meta.website.replace(/^https?:\/\//, "")}</a>`
      : "";

    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `
      <div class="card">
        <header>
          <div><strong>${t}</strong> <span class="tag">${note ? "· " + note : ""}</span></div>
          <span class="tag">#${idx + 1}</span>
        </header>
        <div class="chart" id="chart-${t}"></div>
      </div>
      <div class="card">
        <header>
          <div><strong>${meta.name || t}</strong></div>
          <span class="tag">${cap}</span>
        </header>
        <div class="desc">
          <div class="meta">${sector}${country ? " · " + country : ""}</div>
          <div class="stats">
            ${cap ? `<span>Mkt Cap ${cap}</span>` : ""}
            ${emp ? `<span>${emp}</span>` : ""}
            ${website ? `<span>${website}</span>` : ""}
          </div>
          <div class="summary">${summary}</div>
        </div>
      </div>
    `;
    container.appendChild(row);

    const w = document.createElement("script");
    w.type = "text/javascript";
    w.src = "https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";
    w.async = true;
    w.innerHTML = JSON.stringify({
      autosize: true,
      symbol: t,
      interval: "D",
      timezone: "America/New_York",
      theme: "dark",
      style: "1",
      locale: "en",
      range: "12M",
      withdateranges: true,
      allow_symbol_change: true,
      hide_side_toolbar: false,
      save_image: false,
      // 4 different MA types so studies_overrides can color each distinctly.
      // TradingView's embed widget applies overrides globally per study-name,
      // so 4 MASimple instances would all share one color. Using SMA/EMA/WMA/HMA
      // gives 4 separate override keys. At these lookbacks the visual behavior
      // of these MA flavors is near-identical to pure SMAs.
      studies: [
        { id: "MASimple@tv-basicstudies", inputs: { length: 10 } },       // red
        { id: "MAExponential@tv-basicstudies", inputs: { length: 20 } },  // orange
        { id: "MAWeighted@tv-basicstudies", inputs: { length: 50 } },     // blue
        { id: "MAHull@tv-basicstudies", inputs: { length: 200 } }         // purple
      ],
      studies_overrides: {
        "Moving Average.plot.color":              "#ef4444",  // SMA 10
        "Moving Average.plot.linewidth":          1,
        "Moving Average Exponential.plot.color":  "#f59e0b",  // EMA 20
        "Moving Average Exponential.plot.linewidth": 1,
        "Moving Average Weighted.plot.color":     "#3b82f6",  // WMA 50
        "Moving Average Weighted.plot.linewidth": 2,
        "Hull Moving Average.plot.color":         "#a855f7",  // HMA 200
        "Hull Moving Average.plot.linewidth":     2
      },
      support_host: "https://www.tradingview.com"
    });
    document.getElementById(`chart-${t}`).appendChild(w);
  });
</script>
</body>
</html>
