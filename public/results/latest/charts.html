  function fmtCap(c) {
    if (!c) return "";
    if (c >= 1e12) return "$" + (c / 1e12).toFixed(1) + "T";
    if (c >= 1e9)  return "$" + (c / 1e9).toFixed(2) + "B";
    if (c >= 1e6)  return "$" + (c / 1e6).toFixed(0) + "M";
    return "$" + c;
  }

  const container = document.getElementById("container");

  finalists.forEach(({ t, note }, idx) => {
    const meta = info[t] || {};
    const cap = fmtCap(meta.marketCap);
    const emp = meta.employees ? meta.employees.toLocaleString() + " empl." : "";
    const sector = [meta.sector, meta.industry].filter(Boolean).join(" · ");
    const country = meta.country || "";
    const summary = meta.summary || "(no description available from Yahoo Finance)";
    const website = meta.website
      ? `<a href="${meta.website}" target="_blank" rel="noreferrer">${meta.website.replace(/^https?:\/\//, "")}</a>`
      : "";

    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `
      <div class="card">
        <header>
          <div><strong>${t}</strong> <span class="tag">${note ? "· " + note : ""}</span></div>
          <span class="tag">#${idx + 1}</span>
        </header>
        <div class="chart" id="chart-${t}"></div>
      </div>
      <div class="card">
        <header>
          <div><strong>${meta.name || t}</strong></div>
          <span class="tag">${cap}</span>
        </header>
        <div class="desc">
          <div class="meta">${sector}${country ? " · " + country : ""}</div>
          <div class="stats">
            ${cap ? `<span>Mkt Cap ${cap}</span>` : ""}
            ${emp ? `<span>${emp}</span>` : ""}
            ${website ? `<span>${website}</span>` : ""}
          </div>
          <div class="summary">${summary}</div>
        </div>
      </div>
    `;
    container.appendChild(row);

    const w = document.createElement("script");
    w.type = "text/javascript";
    w.src = "https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";
    w.async = true;
    w.innerHTML = JSON.stringify({
      autosize: true,
      symbol: t,
      interval: "D",
      timezone: "America/New_York",
      theme: "dark",
      style: "1",
      locale: "en",
      range: "12M",
      withdateranges: true,
      allow_symbol_change: true,
      hide_side_toolbar: false,
      save_image: false,
      // 4 different MA types so studies_overrides can color each distinctly.
      // TradingView's embed widget applies overrides globally per study-name,
      // so 4 MASimple instances would all share one color. Using SMA/EMA/WMA/HMA
      // gives 4 separate override keys. At these lookbacks the visual behavior
      // of these MA flavors is near-identical to pure SMAs.
      studies: [
        { id: "MASimple@tv-basicstudies", inputs: { length: 10 } },       // red
        { id: "MAExponential@tv-basicstudies", inputs: { length: 20 } },  // orange
        { id: "MAWeighted@tv-basicstudies", inputs: { length: 50 } },     // blue
        { id: "MAHull@tv-basicstudies", inputs: { length: 200 } }         // purple
      ],
      studies_overrides: {
        "Moving Average.plot.color":              "#ef4444",  // SMA 10
        "Moving Average.plot.linewidth":          1,
        "Moving Average Exponential.plot.color":  "#f59e0b",  // EMA 20
        "Moving Average Exponential.plot.linewidth": 1,
        "Moving Average Weighted.plot.color":     "#3b82f6",  // WMA 50
        "Moving Average Weighted.plot.linewidth": 2,
        "Hull Moving Average.plot.color":         "#a855f7",  // HMA 200
        "Hull Moving Average.plot.linewidth":     2
      },
      support_host: "https://www.tradingview.com"
    });
    document.getElementById(`chart-${t}`).appendChild(w);
  });
</script>
