          <span class="tag">#${idx + 1}</span>
        </header>
        <div class="chart" id="chart-${t}"></div>
      </div>
      <div class="card">
        <header>
          <div><strong>${meta.name || t}</strong></div>
          <span class="tag">${cap}</span>
        </header>
        <div class="desc">
          <div class="meta">${sector}${country ? " · " + country : ""}</div>
          <div class="stats">
            ${cap ? `<span>Mkt Cap ${cap}</span>` : ""}
            ${emp ? `<span>${emp}</span>` : ""}
            ${website ? `<span>${website}</span>` : ""}
          </div>
          <div class="summary">${summary}</div>
        </div>
      </div>
    `;
    container.appendChild(row);

    const w = document.createElement("script");
    w.type = "text/javascript";
    w.src = "https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";
    w.async = true;
    w.innerHTML = JSON.stringify({
      autosize: true,
      symbol: t,
      interval: "D",
      timezone: "America/New_York",
      theme: "dark",
      style: "1",
      locale: "en",
      toolbar_bg: "#0f1115",
      range: "12M",
      withdateranges: true,
      allow_symbol_change: true,
      hide_side_toolbar: false,
      save_image: false,
      hideideas: true,
      overrides: {
        "paneProperties.background": "#0f1115",
        "paneProperties.backgroundType": "solid",
        "paneProperties.vertGridProperties.color": "#1f2632",
        "paneProperties.horzGridProperties.color": "#1f2632",
        "symbolWatermarkProperties.transparency": 92,
        "scalesProperties.textColor": "#9aa0a6"
      },
      studies: [
        { id: "MASimple@tv-basicstudies", inputs: { length: 10 } },
        { id: "MASimple@tv-basicstudies", inputs: { length: 20 } },
        { id: "MASimple@tv-basicstudies", inputs: { length: 50 } },
        { id: "MASimple@tv-basicstudies", inputs: { length: 200 } }
      ],
      studies_overrides: {
        // TradingView namespaces duplicate studies as moving average, moving average_1, etc.
        "moving average.ma.color": "#ef4444",
        "moving average.ma.linewidth": 1,
        "moving average_1.ma.color": "#f59e0b",
        "moving average_1.ma.linewidth": 1,
        "moving average_2.ma.color": "#22c55e",
        "moving average_2.ma.linewidth": 2,
        "moving average_3.ma.color": "#60a5fa",
        "moving average_3.ma.linewidth": 2
      },
      support_host: "https://www.tradingview.com"
    });
    document.getElementById(`chart-${t}`).appendChild(w);
  });
</script>
</body>
</html>
