<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SEPA Finalists — 2026-07-21</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 20px;
    background: #0f1115; color: #e6e6e6;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    line-height: 1.45;
  }
  h1 { font-size: 18px; margin: 0 0 4px; letter-spacing: .3px; }
  .sub { font-size: 12px; color: #9aa0a6; margin: 0 0 20px; }
  .row {
    display: grid;
    grid-template-columns: minmax(0, 3fr) minmax(0, 2fr);
    gap: 14px;
    margin-bottom: 14px;
  }
  .card {
    background: #161a22; border: 1px solid #262b36;
    border-radius: 8px; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .card header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 9px 14px; background: #1b2029; border-bottom: 1px solid #262b36;
    font-size: 13px;
  }
  .tag { color: #9aa0a6; font-size: 11px; }
  .chart { height: 520px; width: 100%; }
  .desc { padding: 14px 16px; font-size: 13px; overflow-y: auto; }
  .desc .meta { font-size: 12px; color: #9aa0a6; margin-bottom: 10px; }
  .desc .stats {
    display: flex; flex-wrap: wrap; gap: 6px 10px; margin-bottom: 12px;
  }
  .desc .stats span {
    background: #1b2029; padding: 3px 8px; border-radius: 4px;
    font-size: 11px; color: #c6cbd3; border: 1px solid #262b36;
  }
  .desc .summary { color: #cfd4dc; font-size: 12.5px; white-space: pre-wrap; }
  .desc a { color: #7ab3ff; text-decoration: none; font-size: 11px; }
  .desc a:hover { text-decoration: underline; }
  @media (max-width: 1100px) {
    .row { grid-template-columns: 1fr; }
    .chart { height: 420px; }
  }
</style>
</head>
<body>
<h1>SEPA Finalists — 2026-07-21</h1>
<p class="sub">1-year daily view · dark TradingView chart · SMA 10 / 20 / 50 / 200 overlays</p>

<div id="container"></div>

<script>
  const finalists = [{"t": "XENE", "note": "sepa_vcp 6 \u00b7 +power_play \u00b7 Entry 6 \u00b7 Lead 7 \u00b7 Tight 2/3 \u00b7 RSpct 93 \u00b7 RS +90"}, {"t": "DDOG", "note": "sepa_vcp 6 \u00b7 +power_play \u00b7 Entry 4 \u00b7 Lead 9 \u00b7 Tight 1/3 \u00b7 Fund 3/5 \u00b7 RSpct 87 \u00b7 RS +59"}, {"t": "SBRA", "note": "sepa_vcp 6 \u00b7 +power_play \u00b7 Entry 4 \u00b7 Lead 6 \u00b7 Tight 0/3 \u00b7 Fund 2/5 \u00b7 RSpct 58 \u00b7 RS +7"}];
  const info = {"XENE": {"name": "XENE", "summary": "(description unavailable right now; will retry next scan)", "sector": "", "industry": "", "country": "", "website": "", "marketCap": 0, "employees": 0}, "DDOG": {"name": "DDOG", "summary": "(description unavailable right now; will retry next scan)", "sector": "", "industry": "", "country": "", "website": "", "marketCap": 0, "employees": 0}, "SBRA": {"name": "SBRA", "summary": "(description unavailable right now; will retry next scan)", "sector": "", "industry": "", "country": "", "website": "", "marketCap": 0, "employees": 0}};

  function fmtCap(c) {
    if (!c) return "";
    if (c >= 1e12) return "$" + (c / 1e12).toFixed(1) + "T";
    if (c >= 1e9)  return "$" + (c / 1e9).toFixed(2) + "B";
    if (c >= 1e6)  return "$" + (c / 1e6).toFixed(0) + "M";
    return "$" + c;
  }

  const container = document.getElementById("container");

  finalists.forEach(({ t, note }, idx) => {
    const meta = info[t] || {};
    const cap = fmtCap(meta.marketCap);
    const emp = meta.employees ? meta.employees.toLocaleString() + " empl." : "";
    const sector = [meta.sector, meta.industry].filter(Boolean).join(" · ");
    const country = meta.country || "";
    const summary = meta.summary || "(no description available from Yahoo Finance)";
    const website = meta.website
      ? `<a href="${meta.website}" target="_blank" rel="noreferrer">${meta.website.replace(/^https?:\/\//, "")}</a>`
      : "";

    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `
      <div class="card">
        <header>
          <div><strong>${t}</strong> <span class="tag">${note ? "· " + note : ""}</span></div>
          <span class="tag">#${idx + 1}</span>
        </header>
        <div class="chart" id="chart-${t}"></div>
      </div>
      <div class="card">
        <header>
          <div><strong>${meta.name || t}</strong></div>
          <span class="tag">${cap}</span>
        </header>
        <div class="desc">
          <div class="meta">${sector}${country ? " · " + country : ""}</div>
          <div class="stats">
            ${cap ? `<span>Mkt Cap ${cap}</span>` : ""}
            ${emp ? `<span>${emp}</span>` : ""}
            ${website ? `<span>${website}</span>` : ""}
          </div>
          <div class="summary">${summary}</div>
        </div>
      </div>
    `;
    container.appendChild(row);

    const w = document.createElement("script");
    w.type = "text/javascript";
    w.src = "https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";
    w.async = true;
    w.innerHTML = JSON.stringify({
      autosize: true,
      symbol: t,
      interval: "D",
      timezone: "America/New_York",
      theme: "dark",
      style: "1",
      locale: "en",
      toolbar_bg: "#0f1115",
      range: "12M",
      withdateranges: true,
      allow_symbol_change: true,
      hide_side_toolbar: false,
      save_image: false,
      hideideas: true,
      overrides: {
        "paneProperties.background": "#0f1115",
        "paneProperties.backgroundType": "solid",
        "paneProperties.vertGridProperties.color": "#1f2632",
        "paneProperties.horzGridProperties.color": "#1f2632",
        "symbolWatermarkProperties.transparency": 92,
        "scalesProperties.textColor": "#9aa0a6"
      },
      studies: [
        { id: "MASimple@tv-basicstudies", inputs: { length: 10 } },
        { id: "MASimple@tv-basicstudies", inputs: { length: 20 } },
        { id: "MASimple@tv-basicstudies", inputs: { length: 50 } },
        { id: "MASimple@tv-basicstudies", inputs: { length: 200 } }
      ],
      studies_overrides: {
        // TradingView namespaces duplicate studies as moving average, moving average_1, etc.
        "moving average.ma.color": "#ef4444",
        "moving average.ma.linewidth": 1,
        "moving average_1.ma.color": "#f59e0b",
        "moving average_1.ma.linewidth": 1,
        "moving average_2.ma.color": "#22c55e",
        "moving average_2.ma.linewidth": 2,
        "moving average_3.ma.color": "#60a5fa",
        "moving average_3.ma.linewidth": 2
      },
      support_host: "https://www.tradingview.com"
    });
    document.getElementById(`chart-${t}`).appendChild(w);
  });
</script>
</body>
</html>
