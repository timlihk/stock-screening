name = "stock-screening"
main = "worker.js"
compatibility_date = "2026-04-18"
workers_dev = true

# Vars (non-secret). Set GITHUB_TOKEN via `wrangler secret put GITHUB_TOKEN`.
[vars]
GITHUB_REPO = "timlihk/stock-screening"
WORKFLOW_FILE = "scan.yml"

# Bind the built landing page as static assets. Results are fetched live from
# GitHub raw by the Worker, so set run_worker_first = true to guarantee the
# Worker's /results/* proxy handler always runs (otherwise a stale locally-bundled
# charts.html would shadow the live version) and disable .html-stripping.
[assets]
directory = "../public"
binding = "ASSETS"
run_worker_first = true
html_handling = "none"
